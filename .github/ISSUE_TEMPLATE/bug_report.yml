name: Bug Report
description: Report a bug in Sencho
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sencho version
      placeholder: "0.86.6 (find this in Settings → About)"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Docker run
        - Development (npm run dev)
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser (if UI issue)
      placeholder: "Chrome 120, Firefox 121, etc."
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant container or browser console logs
      render: shell
  - type: textarea
    id: compose
    attributes:
      label: Compose snippet (if a stack is involved)
      description: Paste the relevant `services:` block. Redact secrets first.
      render: yaml
  - type: textarea
    id: container_logs
    attributes:
      label: Container logs
      description: Output of `docker logs sencho` from the time of the issue.
      render: shell
  - type: textarea
    id: browser_console
    attributes:
      label: Browser console output (if a UI issue)
      description: Open DevTools, reproduce, copy any errors or warnings.
      render: shell
  - type: checkboxes
    id: subsystems
    attributes:
      label: Subsystems involved
      description: Tick any that apply.
      options:
        - label: Trivy / vulnerability scanning
        - label: Pilot Agent (NAT tunnel)
        - label: Sencho Mesh (cross-node networking)
        - label: Fleet Actions / Secrets / Snapshots
        - label: Cloud Backup
        - label: SSO / LDAP
        - label: None of the above
